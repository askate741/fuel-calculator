<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>台亞自助加油計算器</title>

<link rel="manifest" href="manifest.json">

<style>
body{
    font-family: Arial, sans-serif;
    margin:20px;
    background:#f4f6f9;
}

/* ====== 上方工具列 ====== */
.top-bar{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    align-items:flex-start;
}

/* ====== 油價卡片 ====== */
.price-box{
    border:1px solid #ddd;
    padding:15px;
    border-radius:12px;
    background:#ffffff;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    min-width:220px;
}

/* ====== 按鈕區 ====== */
.btn-group{
    display:flex;
    flex-direction:column;
    gap:10px;
}

button{
    padding:10px 15px;
    cursor:pointer;
    border:none;
    border-radius:8px;
    background:#1976d2;
    color:white;
    font-weight:bold;
    transition:0.2s;
}

button:hover{
    background:#125aa0;
}

/* ====== input ====== */
input,select{
    padding:8px;
    width:140px;
    border-radius:6px;
    border:1px solid #ccc;
}

/* ====== table ====== */
table{
    border-collapse:collapse;
    margin-top:20px;
    width:100%;
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

th,td{
    border-bottom:1px solid #eee;
    padding:8px;
    text-align:right;
}

th{
    background:#f0f0f0;
}

/* ====== 標題 ====== */
h2{
    margin-bottom:15px;
}

/* ====== 手機版 ====== */
@media (max-width:600px){
    .top-bar{
        flex-direction:column;
    }
}
</style>

</head>

<body>

<h2>⛽ 台亞自助加油計算器</h2>

<!-- ===== 上方區塊 ===== -->
<div class="top-bar">

    <!-- 按鈕 -->
    <div class="btn-group">
        <button onclick="calc()">計算</button>
        <button onclick="sortTotal()">差額加總排序</button>
    </div>

    <!-- 油價 -->
    <div class="price-box" id="priceInfo">
        讀取最新油價中...
    </div>

</div>

<br>

<!-- ===== 輸入區 ===== -->
油品：
<select id="fuelType" onchange="updatePrice()"></select>

油價：
<input type="number" id="price" step="0.1">

<br><br>

<div id="result"></div>

<script>

const API_URL = "https://sweet-river-af7d.askate741.workers.dev/";

function updatePrice() {
    document.getElementById("price").value =
        document.getElementById("fuelType").value;
}

async function loadOilPrice() {
    try {

        const res = await fetch(API_URL, { cache: "no-store" });
        const data = await res.json();

        document.getElementById("fuelType").innerHTML = `
            <option value="${data.gasoline["92"]}">92無鉛</option>
            <option value="${data.gasoline["95"]}" selected>95無鉛</option>
            <option value="${data.gasoline["98"]}">98無鉛</option>
            <option value="${data.diesel}">超級柴油</option>
        `;

        document.getElementById("priceInfo").innerHTML = `
            <b>⛽ 油價更新日</b><br>
            📅 ${data.updateDate}<br><br>

            🟡 92無鉛：${data.gasoline["92"]} 元<br>
            🟠 95無鉛：${data.gasoline["95"]} 元<br>
            🔴 98無鉛：${data.gasoline["98"]} 元<br>
            ⚫ 柴油：${data.diesel} 元<br><br>

            <small>來源：${data.source ?? "API"}</small>
        `;

        updatePrice();

    } catch (e) {
        document.getElementById("priceInfo").innerHTML =
            "❌ 油價載入失敗<br>" + e;
    }
}

let rowsData = [];
let sortAsc = true;

function calc() {

    let price = parseFloat(document.getElementById("price").value);

    if (isNaN(price)) {
        alert("請輸入油價");
        return;
    }

    rowsData = [];

    for (let i = 100; i <= 700; i++) {

        let l = i / 100;

        let original = Number((price * l).toFixed(3));
        let discount = Number((1.2 * l).toFixed(3));

        let originalDiff = original - Math.round(original);

        let firstDecimal = Math.floor((discount % 1) * 10);

        let discountDiff =
            firstDecimal >= 5
                ? Math.ceil(discount) - discount
                : Math.floor(discount) - discount;

        rowsData.push({
            l,
            original,
            discount,
            originalDiff,
            discountDiff,
            totalDiff: discountDiff + originalDiff
        });
    }

    renderTable(rowsData);
}

function renderTable(data) {

    let html = `
    <table>
    <tr>
        <th>公升</th>
        <th>原價</th>
        <th>折扣</th>
        <th>原價差</th>
        <th>折扣差</th>
        <th>總差額</th>
    </tr>`;

    for (let r of data) {
        html += `
        <tr>
            <td>${r.l.toFixed(2)}</td>
            <td>${r.original.toFixed(3)}</td>
            <td>${r.discount.toFixed(3)}</td>
            <td>${r.originalDiff.toFixed(3)}</td>
            <td>${r.discountDiff.toFixed(3)}</td>
            <td>${r.totalDiff.toFixed(3)}</td>
        </tr>`;
    }

    html += "</table>";

    document.getElementById("result").innerHTML = html;
}

function sortTotal() {

    rowsData.sort((a, b) =>
        sortAsc ? a.totalDiff - b.totalDiff : b.totalDiff - a.totalDiff
    );

    sortAsc = !sortAsc;

    renderTable(rowsData);
}

window.onload = loadOilPrice;

</script>

</body>
</html>
