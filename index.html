<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>台亞自助加油計算器</title>

<link rel="manifest" href="manifest.json">

<style>
body{
    font-family: Arial, sans-serif;
    margin:20px;
}

input,select{
    padding:8px;
    width:120px;
}

button{
    padding:8px 15px;
    margin-right:5px;
    cursor:pointer;
}

table{
    border-collapse:collapse;
    margin-top:15px;
}

th,td{
    border:1px solid #ccc;
    padding:5px 10px;
    text-align:right;
}

th{
    background:#f0f0f0;
}

.price-box{
    border:1px solid #ccc;
    padding:10px;
    margin-bottom:15px;
    display:inline-block;
    background:#f9f9f9;
}
</style>

</head>

<body>

<h2>台亞自助加油計算器</h2>

<div class="price-box" id="priceInfo">
    讀取最新油價中...
</div>

<br><br>

油品：
<select id="fuelType" onchange="updatePrice()"></select>

油價：
<input type="number" id="price" step="0.1">

<button onclick="calc()">計算</button>
<button onclick="sortTotal()">差額加總排序</button>

<div id="result"></div>

<script>

function updatePrice() {
    document.getElementById("price").value =
        document.getElementById("fuelType").value;
}

async function loadOilPrice() {
    try {

        const res = await fetch("oilprice.json?t=" + Date.now(), {
            cache: "no-store"
        });

        if (!res.ok) {
            throw new Error("找不到 oilprice.json");
        }

        const data = await res.json();

        document.getElementById("fuelType").innerHTML = `
            <option value="${data["92"]}">92無鉛</option>
            <option value="${data["95"]}" selected>95無鉛</option>
            <option value="${data["98"]}">98無鉛</option>
            <option value="${data["diesel"]}">超級柴油</option>
        `;

        document.getElementById("priceInfo").innerHTML = `
            <b>油價更新日：</b>${data.updateDate}<br>
            92無鉛：${data["92"]} 元<br>
            95無鉛：${data["95"]} 元<br>
            98無鉛：${data["98"]} 元<br>
            超級柴油：${data["diesel"]} 元
        `;

        updatePrice();

    } catch (e) {

        document.getElementById("priceInfo").innerHTML =
            "油價資料載入失敗<br>" + e.toString();

        console.error(e);
    }
}

let rowsData = [];
let sortAsc = true;

function calc() {

    let price = parseFloat(document.getElementById("price").value);

    if (isNaN(price)) {
        alert("請輸入油價");
        return;
    }

    rowsData = [];

    for (let i = 100; i <= 700; i++) {

        let l = i / 100;

        let original = Number((price * l).toFixed(3));
        let discount = Number((1.2 * l).toFixed(3));

        let originalTargetInt = Math.round(original);
        let originalDiff = original - originalTargetInt;

        let firstDecimal = Math.floor((discount % 1) * 10);

        let discountDiff;

        if (firstDecimal >= 5) {
            discountDiff = Math.ceil(discount) - discount;
        } else {
            discountDiff = Math.floor(discount) - discount;
        }

        let totalDiff = discountDiff + originalDiff;

        rowsData.push({
            l,
            original,
            discount,
            originalDiff,
            discountDiff,
            totalDiff
        });
    }

    renderTable(rowsData);
}

function renderTable(data) {

    let html = `
    <table>
    <tr>
        <th>公升數</th>
        <th>價格</th>
        <th>折扣</th>
        <th>原價進位差額</th>
        <th>折扣進位差額</th>
        <th>差額加總</th>
    </tr>`;

    for (let row of data) {
        html += `
        <tr>
            <td>${row.l.toFixed(2)}</td>
            <td>${row.original.toFixed(3)}</td>
            <td>${row.discount.toFixed(3)}</td>
            <td>${row.originalDiff.toFixed(3)}</td>
            <td>${row.discountDiff.toFixed(3)}</td>
            <td>${row.totalDiff.toFixed(3)}</td>
        </tr>`;
    }

    html += "</table>";

    document.getElementById("result").innerHTML = html;
}

function sortTotal() {

    rowsData.sort((a, b) => {
        return sortAsc
            ? a.totalDiff - b.totalDiff
            : b.totalDiff - a.totalDiff;
    });

    sortAsc = !sortAsc;

    renderTable(rowsData);
}

window.onload = function() {
    loadOilPrice();
};

</script>

<!-- PWA register -->
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
