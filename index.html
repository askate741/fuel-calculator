<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<title>台亞自助加油計算器</title>

<!-- PWA 必備 -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2196f3">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial;
    margin:20px;
}
input{
    padding:8px;
    width:100px;
}
button{
    padding:8px 15px;
    margin-right:5px;
}
table{
    border-collapse:collapse;
    margin-top:15px;
}
th,td{
    border:1px solid #ccc;
    padding:5px 10px;
    text-align:right;
}
th{
    background:#f0f0f0;
}
</style>

</head>

<body>

<h2>台亞自助加油計算器</h2>

油價：
<input type="number" id="price" step="0.1" placeholder="29.8">

<button onclick="calc()">計算</button>
<button onclick="sortTotal()">差額加總排序</button>

<div id="result"></div>

<script>

let rowsData = [];
let sortAsc = true;

function calc() {

    let price = parseFloat(document.getElementById("price").value);

    if (isNaN(price)) {
        alert("請輸入油價");
        return;
    }

    rowsData = [];

    for (let i = 100; i <= 700; i++) {

        let l = i / 100;

        let original = Number((price * l).toFixed(3));
        let discount = Number((1.2 * l).toFixed(3));

        let originalTargetInt = Math.round(original);
        let originalDiff = original - originalTargetInt;

        let firstDecimal = Math.floor((discount % 1) * 10);

        let discountDiff;

        if (firstDecimal >= 5) {
            discountDiff = Math.ceil(discount) - discount;
        } else {
            discountDiff = Math.floor(discount) - discount;
        }

        let totalDiff = discountDiff + originalDiff;

        rowsData.push({
            l,
            original,
            discount,
            originalDiff,
            discountDiff,
            totalDiff
        });
    }

    renderTable(rowsData);
}

function renderTable(data) {

    let html = `
    <table>
    <tr>
        <th>公升數</th>
        <th>價格</th>
        <th>折扣</th>
        <th>原價進位差額</th>
        <th>折扣進位差額</th>
        <th>差額加總</th>
    </tr>`;

    for (let row of data) {
        html += `
        <tr>
            <td>${row.l.toFixed(2)}</td>
            <td>${row.original.toFixed(3)}</td>
            <td>${row.discount.toFixed(3)}</td>
            <td>${row.originalDiff.toFixed(3)}</td>
            <td>${row.discountDiff.toFixed(3)}</td>
            <td>${row.totalDiff.toFixed(3)}</td>
        </tr>`;
    }

    html += "</table>";

    document.getElementById("result").innerHTML = html;
}

function sortTotal() {

    rowsData.sort((a, b) => {
        return sortAsc
            ? a.totalDiff - b.totalDiff
            : b.totalDiff - a.totalDiff;
    });

    sortAsc = !sortAsc;

    renderTable(rowsData);
}

</script>

<!-- PWA Service Worker -->
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./service-worker.js");
}
</script>

</body>
</html>
